steps:
- name: 'node:22'
  entrypoint: 'npm'
  args: ['install']

- name: 'node:22'
  entrypoint: 'npm'
  args: ['test']
  
- name: "gcr.io/cloud-builders/docker"
  args:
  - build
  - "--tag=europe-west9-docker.pkg.dev/$PROJECT_ID/docker/myimage:tag1"
  - "--file=./Dockerfile-prod"
  - .
  automapSubstitutions: true
images:
- "europe-west9-docker.pkg.dev/$PROJECT_ID/docker/myimage:tag1"
options:
  logging: CLOUD_LOGGING_ONLY